<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
            color: #38bdf8;
        }

        form {
            text-align: center;
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            width: 300px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 20px;
            margin-left: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            color: black;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            margin: 15px;
            width: 200px;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .card h3 {
            text-align: center;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h1>🎬 Movie Recommendation System</h1>

<form method="POST">
    <input type="text" name="movie" placeholder="Enter movie name (e.g. Avatar)" required>
    <button type="submit">Search</button>
</form>

<div class="container">
    {% if movies %}
        {% for i in range(movies|length) %}
        <div class="card">
            <img src="{{ posters[i] }}">
            <h3>{{ movies[i] }}</h3>
        </div>
        {% endfor %}
    {% endif %}
</div>

</body>
</html>
